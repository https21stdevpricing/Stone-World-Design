kind = "web"
previewPath = "/"
title = "Stone World"
version = "1.0.0"
id = "artifacts/stone-world"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24607

[services.development]
run = "pnpm --filter @workspace/stone-world run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stone-world", "run", "build" ]
publicDir = "artifacts/stone-world/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24607"
BASE_PATH = "/"
